apiVersion: v1
kind: Service
metadata:
  name: {{ include "port-forward-proxy.fullname" . }}
  labels:
    {{- include "port-forward-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: proxy
      protocol: TCP
      name: proxy
  selector:
    {{- include "port-forward-proxy.selectorLabels" . | nindent 4 }}

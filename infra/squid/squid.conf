acl SSL_ports port 443
#acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

acl Allow_sites dstdomain .graph.microsoft.com .grafana-sandbox.dev.lkab.com .view-epe.lkab.com .ifconfig.co

# Deny requests to other ports
http_access deny !Safe_ports
# Deny CONNECT to other than secure SSL ports
http_access deny CONNECT !SSL_Ports
# No cachemgr access and no cache
http_access deny manager
cache deny all
# Protect innocent web applications running on the proxy server who think
# the only one who can access services on "localhost" is a local user
http_access deny to_localhost

# Allow access from localhost only
http_access allow localhost Allow_sites
http_access deny all

# No need for ICMP
pinger_enable off

# No need to bind to anything else than localhost
http_port 127.0.0.1:3128

coredump_dir /var/spool/squid
